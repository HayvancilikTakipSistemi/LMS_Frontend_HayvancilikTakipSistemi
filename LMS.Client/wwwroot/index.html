<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Livestock Elite LMS</title>
    <base href="/" />

                        "background": "#0e0e0e",

                        "full": "9999px"

                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                }
            }
        }

    <link href="css/app.css" rel="stylesheet" />
    <link href="LMS.Client.styles.css" rel="stylesheet" />
</head>

<body class="bg-surface text-on-surface font-body selection:bg-primary/30 selection:text-primary overflow-x-hidden antialiased">
    <div id="app">
        <svg class="loading-progress" style="display:block; margin: 20vh auto;">
            <circle r="40%" cx="50%" cy="50%" fill="none" stroke="#6bfe9c" stroke-width="4" />
        </svg>
    </div>

    <div id="blazor-error-ui" class="hidden fixed bottom-5 right-5 bg-error-container text-on-error-container p-4 rounded-xl shadow-lg z-50">
        An unhandled error has occurred.
        <a href="" class="reload font-bold underline ml-2">Reload</a>
        <a class="dismiss cursor-pointer ml-4 font-bold">🗙</a>
    </div>
    
    <script src="_framework/blazor.webassembly.js"></script>

</html>
